<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursor Pet — Customize</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <header class="topbar">
      <span class="brand">cursor&#8209;pet</span>
      <span class="brand-sub">/ customize</span>
      <span class="autosave">changes save automatically</span>
    </header>

    <div class="layout">
      <!-- Hero: the live pet, at its real size & opacity -->
      <section class="stage">
        <div class="screen">
          <canvas id="stage"></canvas>
          <div class="scanline"></div>
        </div>
        <div class="stage-meta">
          <span id="stage-name" class="stage-name">classic</span>
          <span class="stage-hint">live preview</span>
        </div>
        <div class="swatches" id="swatches"></div>
      </section>

      <!-- Controls -->
      <section class="controls">
        <div class="group">
          <div class="glabel"><i></i>appearance</div>
          <div class="row">
            <label for="scale">Size</label>
            <input type="range" id="scale" min="0.4" max="2.5" step="0.05" />
            <output id="scale-val"></output>
          </div>
          <div class="row">
            <label for="opacity">Opacity</label>
            <input type="range" id="opacity" min="0.2" max="1" step="0.05" />
            <output id="opacity-val"></output>
          </div>
        </div>

        <div class="group">
          <div class="glabel"><i></i>movement</div>
          <label class="switch">
            <input type="checkbox" id="follow" />
            <span class="box"></span>
            <span>Follow the cursor</span>
          </label>
          <div class="row">
            <label for="speed">Speed</label>
            <input type="range" id="speed" min="60" max="600" step="10" />
            <output id="speed-val"></output>
          </div>
          <div class="row">
            <label for="follow_gap">Distance</label>
            <input type="range" id="follow_gap" min="20" max="200" step="5" />
            <output id="follow_gap-val"></output>
          </div>
          <div class="row">
            <label for="reaction">Smoothness</label>
            <input type="range" id="reaction" min="0" max="0.5" step="0.02" />
            <output id="reaction-val"></output>
          </div>
        </div>

        <div class="group">
          <div class="glabel"><i></i>idle</div>
          <label class="switch">
            <input type="checkbox" id="sleep_enabled" />
            <span class="box"></span>
            <span>Sleep when idle</span>
          </label>
          <div class="row">
            <label for="idle_before_sleep">Sleep after</label>
            <input type="range" id="idle_before_sleep" min="2" max="30" step="1" />
            <output id="idle_before_sleep-val"></output>
          </div>
          <label class="switch">
            <input type="checkbox" id="fidget_enabled" />
            <span class="box"></span>
            <span>Occasional fidgets</span>
          </label>
        </div>

        <div class="group">
          <div class="glabel"><i></i>system</div>
          <label class="switch">
            <input type="checkbox" id="autostart" />
            <span class="box"></span>
            <span>Start on login</span>
          </label>
        </div>

        <div class="footer">
          <button id="reset" class="reset">Reset to defaults</button>
        </div>
      </section>
    </div>

    <script type="module" src="settings.js"></script>
  </body>
</html>
